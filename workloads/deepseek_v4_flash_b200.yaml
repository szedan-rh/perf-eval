# DeepSeek-V4-Flash on B200 (TP=8 + EP, deep_gemm_mega_moe)
name: deepseek_v4_flash-b200
gpu: B200
num_gpus: 8
# Parked: the vLLM release image ships a mismatched nvidia-cu13 toolchain
# (nvcc/cccl vs cuda runtime headers), so the DeepSeek-V4 mHC TileLang kernel
# fails to JIT-compile at engine startup on sm_100a ("CUDA compiler and CUDA
# toolkit headers are incompatible"). There is no runtime/serve-arg workaround
# (MHCPreOp.forward_cuda hardcodes the tilelang op). Re-enable once a vLLM image
# with an aligned cu13 toolchain ships. See vllm-project/vllm#44305.
# Still triggerable explicitly via the WORKLOADS env var.
nightly: false

vllm:
  model: deepseek-ai/DeepSeek-V4-Flash
  serve_args: >-
    --trust-remote-code
    --kv-cache-dtype fp8
    --block-size 256
    --enable-expert-parallel
    --tensor-parallel-size 8
    --attention_config.use_fp4_indexer_cache=True
    --moe-backend deep_gemm_mega_moe
    --tokenizer-mode deepseek_v4
    --tool-call-parser deepseek_v4
    --enable-auto-tool-choice
    --reasoning-parser deepseek_v4

bfcl:
  test_categories:
    - simple_python
    - multiple
    - parallel
    - parallel_multiple
  num_threads: 8

lm_eval:
  model_args:
    tokenized_requests: false
    tokenizer_backend: null
    timeout: 6000
  tasks:
    - name: gsm8k
      num_fewshot: 5
      model_args:
        num_concurrent: 64
        max_length: 32768
        max_gen_toks: 8192
